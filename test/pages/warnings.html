<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Warnings - Sa11y Unit Tests</title>
  <link rel="stylesheet" href="../../docs/examples/assets/main.css">
  <script src="assets/nav.js"></script>
</head>

<body>
  <header>
    <strong class="h1">Sa11y Unit Tests</strong>
    <p>Some warnings and props.</p>
  </header>
  <main>

    <h2>Hidden iframe here for testing</h2>
    <div id="warning-iframe">
      <div hidden><iframe title="Example" src="https://www.example.com"></iframe></div>
    </div>

    <h2>Skipped heading is warning via prop</h2>
    <div id="warning-skipped-heading">
      <h4>This is a heading four</h4>
    </div>

    <h2>Table with empty header</h2>
    <div id="warning-empty-table-header">
      <table>
        <tbody>
          <tr>
            <th></th>
            <th>Time</th>
            <th>Location</th>
          </tr>
          <tr>
            <td>Keynote</td>
            <td>9:00 AM</td>
            <td>Auditorium</td>
          </tr>
          <tr>
            <td>Lunch</td>
            <td>12:00 PM</td>
            <td>Skyline Room</td>
          </tr>
          <tr>
            <td>Closing Dinner</td>
            <td>5:00 PM</td>
            <td>Metropolitan Room</td>
          </tr>
        </tbody>
      </table>
    </div>

  </main>
  <!-- Sa11y -->
  <link rel="stylesheet" href="../../src/css/sa11y.css" />
  <script type="module" src="./assets/sa11y.js"></script>
</body>

</html>
