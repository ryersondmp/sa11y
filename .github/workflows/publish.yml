name: "Deploy to NPM"

on:
  release:
    types: [created]

jobs:
    release:
        name: release
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - name: Setup node
              uses: actions/setup-node@v4
              with:
                  node-version: 24.x
                  registry-url: https://registry.npmjs.org
            - name: Publish to NPM 📦
              run: npm publish --access public
